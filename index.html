<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Analysis & Priority Prediction</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Complaint Analysis & Priority Prediction System</h1>

    <div class="container">

        <textarea id="complaint" placeholder="Enter your complaint here..." rows="6"></textarea>

        <br>

        <button id="analyzeBtn">
            Analyze Complaint
        </button>

        <div id="result">

        </div>

        <div class="stats">

            <div class="card">
                <h3 id="totalComplaints">0</h3>
                <p>Total Complaints</p>
            </div>

            <div class="card">
                <h3 id="highCount">0</h3>
                <p>High Priority</p>
            </div>

            <div class="card">
                <h3 id="mediumCount">0</h3>
                <p>Medium Priority</p>
            </div>

            <div class="card">
                <h3 id="lowCount">0</h3>
                <p>Low Priority</p>
            </div>

        </div>

        <h2>Complaint Dashboard</h2>

        <table id="complaintTable">
            <thead>
                <tr>
                    <th>Complaint</th>
                    <th>Category</th>
                    <th>Priority</th>
                </tr>
            </thead>

            <tbody id="tableBody">

            </tbody>
        </table>

        <h2>Complaint Distribution</h2>

        <canvas id="complaintChart"></canvas>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>
</html>
