<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Analysis & Priority Prediction</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Complaint Analysis & Priority Prediction System</h1>

    <div class="container">

        <textarea id="complaint" placeholder="Enter your complaint here..." rows="6"></textarea>

        <br>

        <button id="analyzeBtn">
            Analyze Complaint
        </button>

        <div id="result">

        </div>

        <h2>Complaint Dashboard</h2>

        <table id="complaintTable">
            <thead>
                <tr>
                    <th>Complaint</th>
                    <th>Category</th>
                    <th>Priority</th>
                </tr>
            </thead>

            <tbody id="tableBody">

            </tbody>
        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
